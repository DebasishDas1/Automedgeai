# render.yaml
# Render Blueprint — automedge backend
# Deploy: connect GitHub repo → Render dashboard → "New Blueprint"

services:
  - type: web
    name: automedge-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend

    buildCommand: pip install -r requirements.txt

    startCommand: >
      uvicorn main:app
      --host 0.0.0.0
      --port $PORT
      --timeout-keep-alive 120

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # Runtime
      - key: ENVIRONMENT
        value: prod

      - key: PYTHON_VERSION
        value: "3.12.9"

      - key: PYTHONUNBUFFERED
        value: "1"

      # Database
      - key: DATABASE_URL
        sync: false

      # Firebase
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

      # Google Sheets
      - key: SHEETS_CREDENTIALS_JSON
        sync: false

      - key: HVAC_SHEET_ID
        sync: false

      - key: ROOFING_SHEET_ID
        sync: false

      - key: PLUMBING_SHEET_ID
        sync: false

      - key: PEST_SHEET_ID
        sync: false

      # LLM
      - key: GROQ_API_KEY
        sync: false

      # Email
      - key: RESEND_API_KEY
        sync: false

      - key: EMAIL_FROM
        sync: false

      # Twilio
      - key: TWILIO_ACCOUNT_SID
        sync: false

      - key: TWILIO_AUTH_TOKEN
        sync: false

      - key: TWILIO_FROM_NUMBER
        sync: false

      # Business
      - key: BUSINESS_PHONE
        value: "+1-555-000-0000"

      - key: TEAM_EMAIL
        value: "team@automedge.com"

      # CORS
      - key: ALLOWED_ORIGINS
        value: "https://automedge.vercel.app,http://localhost:3000"
