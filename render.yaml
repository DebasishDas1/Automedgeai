# render.yaml
# Render Blueprint — Automedge backend using uv
services:
  - type: web
    name: automedge-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend

    # Build command: install uv and sync dependencies
    buildCommand: |
      pip install --upgrade pip
      pip install uv==0.11.3
      uv sync --frozen --no-dev

    # Start command: run uv directly
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # Runtime
      - key: ENVIRONMENT
        value: prod

      - key: PYTHON_VERSION
        value: "3.12.9"

      - key: PYTHONUNBUFFERED
        value: "1"

      # Database
      - key: DATABASE_URL
        sync: false

      # Firebase
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

      # Google Sheets
      - key: SHEETS_CREDENTIALS_JSON
        sync: false

      - key: HVAC_SHEET_ID
        sync: false

      - key: ROOFING_SHEET_ID
        sync: false

      - key: PLUMBING_SHEET_ID
        sync: false

      - key: PEST_SHEET_ID
        sync: false

      # LLM
      - key: GROQ_API_KEY
        sync: false

      # Email
      - key: RESEND_API_KEY
        sync: false

      - key: EMAIL_FROM
        sync: false

      # Twilio
      - key: TWILIO_ACCOUNT_SID
        sync: false

      - key: TWILIO_AUTH_TOKEN
        sync: false

      - key: TWILIO_FROM_NUMBER
        sync: false

      - key: TWILIO_WA_FROM
        value: "whatsapp:+14155238886"

      # Retell
      - key: RETELL_API_KEY
        sync: false

      - key: RETELL_AGENT_ID
        sync: false

      - key: RETELL_WEBHOOK_SECRET
        sync: false

      # Business
      - key: CLINIC_NAME
        value: "Lone Star Cooling & Heating"

      - key: BUSINESS_PHONE
        value: "+1-512-555-0199"

      - key: TEAM_EMAIL
        value: "bookings@automedge.com"

      - key: TEAM_WHATSAPP_NUMBER
        sync: false

      # CORS
      - key: ALLOWED_ORIGINS
        value: '["https://automedge.vercel.app", "http://localhost:3000"]'

      # Frontend
      - key: NEXT_PUBLIC_MAIN_DOMAIN
        value: "automedge.com"
