# render.yaml
# Render Blueprint — automedge backend
# Deploy: connect GitHub repo → Render dashboard → "New Blueprint"

services:
  - type: web
    name: automedge-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend # ← tells Render to treat backend/ as the working directory

    buildCommand: pip install -r requirements.txt

    startCommand: >
      uvicorn main:app
      --host 0.0.0.0
      --port $PORT
      --workers 2
      --timeout-keep-alive 120
      --log-level info

    healthCheckPath: /healthz
    autoDeploy: true

    envVars:
      # ── Runtime ────────────────────────────────────────────────────────
      - key: ENVIRONMENT
        value: prod

      - key: PYTHON_VERSION
        value: "3.12.9"

      # ── Database ────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ── Firebase ────────────────────────────────────────────────────────
      # Paste full JSON string from your Firebase service account file
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

      # ── Google Sheets ────────────────────────────────────────────────────
      # Paste full JSON string from your Sheets service account file
      - key: SHEETS_CREDENTIALS_JSON
        sync: false

      - key: HVAC_SHEET_ID
        sync: false

      - key: ROOFING_SHEET_ID
        sync: false

      - key: PLUMBING_SHEET_ID
        sync: false

      - key: PEST_SHEET_ID
        sync: false

      # ── LLM ────────────────────────────────────────────────────────────
      # Set at least one. Groq is free tier — good for production fallback.
      - key: GROQ_API_KEY
        sync: false

      # ── Resend ────────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false

      - key: EMAIL_FROM
        sync: false # e.g. hello@automedge.com (must be verified in Resend)

      # ── Twilio ────────────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false

      - key: TWILIO_AUTH_TOKEN
        sync: false

      - key: TWILIO_FROM_NUMBER
        sync: false

      # ── Business ──────────────────────────────────────────────────────
      - key: BUSINESS_PHONE
        value: "+1-555-000-0000"

      - key: TEAM_EMAIL
        value: "team@automedge.com"

      # ── CORS ──────────────────────────────────────────────────────────
      - key: ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com,http://localhost:3000"
